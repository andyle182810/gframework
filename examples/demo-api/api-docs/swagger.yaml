    type: object
  httpserver.APIResponse-service_UpdateUserResponse:
    properties:
      data:
        $ref: '#/definitions/service.UpdateUserResponse'
      pagination:
        $ref: '#/definitions/httpserver.Pagination'
      requestId:
        example: 3bf74527-8097-4217-8485-ffe05d16f82e
        type: string
    type: object
  httpserver.Pagination:
    properties:
      page:
        example: 1
